query getProjectFull($id: ID!, $fileLimit: Int = 500, $fileOffset: Int = 0) {
  project(id: $id) {
    id
    name
    tags
    deleted
    createdOn
    updatedOn
    projectType {
      id
      name
    }    
    ownedBy {
      ...dbobjSm
      __typename
    }
    visibility
    permissions {
      delete
      update
      view
    }
    files(limit: $fileLimit, offset: $fileOffset) {
      total
      items {
        localPath
        size
        etag
      }
    }
  }
}
fragment dbobjSm on DBObj {
  id
  name
}